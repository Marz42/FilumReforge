# =============================================================================
# Project Filum — Production Nginx configuration
# Target: Ubuntu + Nginx + systemd deployment (host-level, NOT inside Docker)
#
# Setup steps:
#   1. Install: sudo apt install nginx
#   2. Copy:    sudo cp nginx.prod.conf /etc/nginx/sites-available/filum
#   3. Symlink: sudo ln -sf /etc/nginx/sites-available/filum /etc/nginx/sites-enabled/filum
#   4. TLS:     sudo certbot --nginx -d <your-domain>
#              (Certbot will auto-fill the ssl_certificate lines below)
#   5. Build frontend: cd /srv/filum/frontend && npm run build
#              (output goes to /srv/filum/frontend/dist)
#   6. Test:    sudo nginx -t
#   7. Apply:   sudo systemctl reload nginx
#
# Replace ALL occurrences of <your-domain> with your actual domain name.
# =============================================================================

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name <your-domain>;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name <your-domain>;

    # ── TLS (Certbot manages these paths) ──────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/<your-domain>/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/<your-domain>/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # ── Security headers ───────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Gzip compression ───────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        application/xml
        application/wasm
        image/svg+xml
        font/woff2;

    # Frontend static files root
    root /srv/filum/frontend/dist;

    # ── Backend API reverse proxy ──────────────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Allow large file uploads (attachments)
        client_max_body_size 64m;

        # Long-running responses (AI streaming, SSE)
        proxy_read_timeout 120s;
        proxy_buffering off;
    }

    # ── Service worker: MUST NOT be cached by browsers ────────────────────
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # ── PWA manifest: short TTL ───────────────────────────────────────────
    location = /manifest.webmanifest {
        add_header Cache-Control "public, max-age=3600";
    }

    # ── Hashed Vite assets: permanent cache ───────────────────────────────
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── SPA fallback: Vue Router handles client-side routing ─────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate";
    }
}
