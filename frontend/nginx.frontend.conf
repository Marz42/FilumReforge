# Nginx configuration for the frontend container (Dockerfile.prod).
# Serves the built Vue 3 SPA with correct caching headers.
# This file is NOT used for host-level deployments; see infra/nginx/nginx.prod.conf.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Service worker MUST NOT be cached — browsers need the latest version
    # to detect updates and trigger re-installs.
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # PWA manifest: short TTL so icon/theme updates propagate quickly.
    location = /manifest.webmanifest {
        add_header Cache-Control "public, max-age=3600";
    }

    # Hashed static assets produced by Vite: aggressive long-term caching.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SPA fallback: Vue Router handles client-side routing.
    # Unknown paths return index.html so deep-links work after reload.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate";
    }
}
