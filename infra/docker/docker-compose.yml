services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-filum}
      POSTGRES_USER: ${POSTGRES_USER:-filum}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-filum}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-filum} -d ${POSTGRES_DB:-filum}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    environment:
      APP_NAME: Project Filum API
      APP_ENV: development
      APP_VERSION: 0.1.0
      API_V1_PREFIX: /api/v1
      POSTGRES_DSN: postgresql+asyncpg://${POSTGRES_USER:-filum}:${POSTGRES_PASSWORD:-filum}@postgres:5432/${POSTGRES_DB:-filum}
      REDIS_DSN: redis://redis:6379/0
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-5-mini}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      OPENAI_EMBEDDING_DIMENSIONS: ${OPENAI_EMBEDDING_DIMENSIONS:-1536}
      WEB_PUSH_PUBLIC_KEY: ${WEB_PUSH_PUBLIC_KEY:-}
      WEB_PUSH_PRIVATE_KEY: ${WEB_PUSH_PRIVATE_KEY:-}
      WEB_PUSH_SUBJECT: ${WEB_PUSH_SUBJECT:-mailto:filum@example.com}
      STORAGE_PROVIDER: local
      STORAGE_BUCKET: filum-dev
      STORAGE_BASE_PATH: /app/.storage
    working_dir: /app
    volumes:
      - ../../backend:/app
    command: ["./scripts/start-dev.sh"]
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://127.0.0.1:8000/healthz'')"',
        ]
      interval: 15s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    environment:
      APP_NAME: Project Filum API
      APP_ENV: development
      APP_VERSION: 0.1.0
      API_V1_PREFIX: /api/v1
      POSTGRES_DSN: postgresql+asyncpg://${POSTGRES_USER:-filum}:${POSTGRES_PASSWORD:-filum}@postgres:5432/${POSTGRES_DB:-filum}
      REDIS_DSN: redis://redis:6379/0
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-5-mini}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      OPENAI_EMBEDDING_DIMENSIONS: ${OPENAI_EMBEDDING_DIMENSIONS:-1536}
      WEB_PUSH_PUBLIC_KEY: ${WEB_PUSH_PUBLIC_KEY:-}
      WEB_PUSH_PRIVATE_KEY: ${WEB_PUSH_PRIVATE_KEY:-}
      WEB_PUSH_SUBJECT: ${WEB_PUSH_SUBJECT:-mailto:filum@example.com}
      STORAGE_PROVIDER: local
      STORAGE_BUCKET: filum-dev
      STORAGE_BASE_PATH: /app/.storage
    working_dir: /app
    volumes:
      - ../../backend:/app
    command: ["./scripts/start-worker.sh"]
    depends_on:
      backend:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    environment:
      VITE_DEV_API_PROXY_TARGET: http://backend:8000
    working_dir: /app
    volumes:
      - ../../frontend:/app
      - frontend-node-modules:/app/node_modules
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173"]
    ports:
      - "${FRONTEND_PORT:-5173}:5173"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - backend
      - frontend
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - ../nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres-data:
  frontend-node-modules:
