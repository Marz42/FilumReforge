# =============================================================================
# Project Filum — Production Docker Compose
# Suitable for container-based production deployments.
# No source code bind mounts. No --reload. Uses production Dockerfiles.
#
# Usage:
#   cp .env.prod.example .env.prod
#   # Edit .env.prod with real secrets/credentials
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
#
# First-time setup:
#   docker compose -f docker-compose.prod.yml --env-file .env.prod run --rm backend alembic upgrade head
#
# Recommended: place a host-level Nginx or load balancer in front for TLS.
# See infra/nginx/nginx.prod.conf for the host Nginx HTTPS template.
# =============================================================================

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-filum}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be set in .env.prod}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env.prod}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-filum}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Persist to disk: RDB snapshot + AOF for durability.
    command: ["redis-server", "--save", "900", "1", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    environment:
      APP_ENV: production
      # Backend listens on 0.0.0.0 so Nginx can reach it over the Docker network.
      BIND_HOST: "0.0.0.0"
      POSTGRES_DSN: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-filum}
      REDIS_DSN: redis://redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY must be set in .env.prod}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      FRONTEND_APP_URL: ${FRONTEND_APP_URL:?FRONTEND_APP_URL must be set in .env.prod}
      WORKFLOW_GRAPH_ENGINE_ENABLED: ${WORKFLOW_GRAPH_ENGINE_ENABLED:-true}
      TASK_CENTER_V2_ENABLED: ${TASK_CENTER_V2_ENABLED:-true}
      CORS_ALLOWED_HEADERS: ${CORS_ALLOWED_HEADERS:-Authorization,Content-Type,X-Request-ID}
      CORS_ALLOWED_METHODS: ${CORS_ALLOWED_METHODS:-GET,POST,PUT,PATCH,DELETE,OPTIONS}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-4o-mini}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      OPENAI_EMBEDDING_DIMENSIONS: ${OPENAI_EMBEDDING_DIMENSIONS:-1536}
      WEB_PUSH_PUBLIC_KEY: ${WEB_PUSH_PUBLIC_KEY:-}
      WEB_PUSH_PRIVATE_KEY: ${WEB_PUSH_PRIVATE_KEY:-}
      WEB_PUSH_SUBJECT: ${WEB_PUSH_SUBJECT:-mailto:ops@example.com}
      STORAGE_PROVIDER: local
      STORAGE_BUCKET: ${STORAGE_BUCKET:-filum-prod}
      STORAGE_BASE_PATH: /srv/filum/data/storage
    volumes:
      - filum-storage:/srv/filum/data/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz')\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: ../../backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    environment:
      APP_ENV: production
      POSTGRES_DSN: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-filum}
      REDIS_DSN: redis://redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      FRONTEND_APP_URL: ${FRONTEND_APP_URL:?FRONTEND_APP_URL must be set in .env.prod}
      WORKFLOW_GRAPH_ENGINE_ENABLED: ${WORKFLOW_GRAPH_ENGINE_ENABLED:-true}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-4o-mini}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      OPENAI_EMBEDDING_DIMENSIONS: ${OPENAI_EMBEDDING_DIMENSIONS:-1536}
      WEB_PUSH_PUBLIC_KEY: ${WEB_PUSH_PUBLIC_KEY:-}
      WEB_PUSH_PRIVATE_KEY: ${WEB_PUSH_PRIVATE_KEY:-}
      WEB_PUSH_SUBJECT: ${WEB_PUSH_SUBJECT:-mailto:ops@example.com}
      STORAGE_PROVIDER: local
      STORAGE_BUCKET: ${STORAGE_BUCKET:-filum-prod}
      STORAGE_BASE_PATH: /srv/filum/data/storage
    volumes:
      - filum-storage:/srv/filum/data/storage
    command: ["./scripts/start-worker.sh"]
    depends_on:
      backend:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    # No exposed ports — gateway Nginx proxies to this container on port 80.

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ../nginx/nginx.compose.prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres-data:
  redis-data:
  filum-storage:
