# =============================================================================
# Project Filum — Nginx gateway for docker-compose.prod.yml
# Handles: API reverse proxy to backend:8000 and static SPA proxy to frontend:80
#
# This config runs INSIDE the Docker gateway container.
# TLS termination should be handled by a host-level Nginx or load balancer
# placed in front of this container.
# =============================================================================
server {
    listen 80;
    server_name _;

    # ── Gzip compression ───────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        application/xml
        application/wasm
        image/svg+xml
        font/woff2;

    # ── Backend API reverse proxy ──────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

        client_max_body_size 64m;
        proxy_read_timeout 120s;
        proxy_buffering off;
    }

    # ── Frontend SPA (served by the frontend nginx:alpine container) ───────
    location / {
        proxy_pass http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
